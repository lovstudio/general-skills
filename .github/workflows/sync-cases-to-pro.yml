name: Sync cases to pro-skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/cases/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: skills

      - uses: actions/checkout@v4
        with:
          repository: lovstudio/pro-skills
          token: ${{ secrets.PRO_SKILLS_TOKEN }}
          path: pro-skills

      - name: Sync cases to pro-skills
        run: |
          cd skills
          # Find all cases directories and sync to pro-skills/upstream/skills/
          for cases_dir in skills/*/cases; do
            [ -d "$cases_dir" ] || continue
            skill_dir=$(dirname "$cases_dir")
            skill_name=$(basename "$skill_dir")

            # Sync to upstream/skills/ (the mirror of lovstudio/skills)
            target="../pro-skills/upstream/$skill_dir/cases"
            mkdir -p "$target"
            cp -r "$cases_dir/"* "$target/"

            # Also sync to skills/ if the skill exists there (pro-only skills)
            if [ -d "../pro-skills/$skill_dir" ]; then
              target2="../pro-skills/$skill_dir/cases"
              mkdir -p "$target2"
              cp -r "$cases_dir/"* "$target2/"
            fi
          done

      - name: Commit and push
        run: |
          cd pro-skills
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-sync cases from lovstudio/skills"
          git push
