name: Sync README Skills Table

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/SKILL.md'
      - 'scripts/generate-skills-table.py'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml

      - run: python scripts/generate-skills-table.py

      - name: Commit if changed
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-sync skills table in README"
          git push
